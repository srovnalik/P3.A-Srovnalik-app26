<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SROVNALIK FINANCE | Investiční webová aplikace</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #1a1a1a;
            color: #f5f5f5;
            line-height: 1.6;
            padding: 60px 20px;
        }

        .wrapper {
            max-width: 900px;
            margin: 0 auto;
            background-color: #111111;
            border: 1px solid #2d2d2d;
            border-radius: 8px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        header {
            text-align: center;
            padding-bottom: 30px;
            border-bottom: 1px solid #2d2d2d;
            margin-bottom: 40px;
        }

        .brand-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .app-logo {
            max-width: 220px;
            height: auto;
            display: block;
            margin: 0 auto 10px auto;
        }

        .brand-subtitle {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #8c8c8c;
            margin-top: 5px;
        }

        .section-title {
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ffffff;
            margin-bottom: 20px;
            padding-left: 10px;
            border-left: 3px solid #ffffff;
        }

        .products-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 40px;
        }

        .product-item {
            background-color: #161616;
            border: 1px solid #262626;
            border-radius: 6px;
            padding: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease-in-out;
        }

        .product-item:hover {
            border-color: #444444;
            background-color: #1c1c1c;
        }

        .product-details {
            flex: 1;
            padding-right: 20px;
        }

        .product-details h3 {
            color: #ffffff;
            font-size: 18px;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .product-details p {
            color: #999999;
            font-size: 14px;
        }

        .product-action {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .product-cost {
            font-size: 16px;
            font-weight: 700;
            color: #ffffff;
            white-space: nowrap;
        }

        .input-qty {
            width: 70px;
            background-color: #222222;
            border: 1px solid #3a3a3a;
            color: #ffffff;
            padding: 10px;
            border-radius: 4px;
            text-align: center;
            font-size: 15px;
            font-weight: 600;
        }

        .grid-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        .meta-panel {
            background-color: #161616;
            border: 1px solid #262626;
            padding: 25px;
            border-radius: 6px;
        }

        .meta-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
            color: #aaaaaa;
        }

        .meta-row.highlight {
            font-size: 19px;
            font-weight: 700;
            color: #ffffff;
            border-top: 1px solid #262626;
            padding-top: 12px;
            margin-top: 15px;
        }

        .form-field {
            margin-bottom: 15px;
        }

        .form-field label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8c8c8c;
            margin-bottom: 6px;
        }

        .form-field input {
            width: 100%;
            background-color: #222222;
            border: 1px solid #3a3a3a;
            color: #ffffff;
            padding: 11px 14px;
            border-radius: 4px;
            font-size: 14px;
        }

        .action-button {
            width: 100%;
            background-color: #ffffff;
            color: #111111;
            border: none;
            padding: 18px;
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            border-radius: 4px;
            cursor: pointer;
        }

        .action-button:hover {
            background-color: #dddddd;
        }

        .warning-text {
            color: #ff4444;
            font-size: 13px;
            margin-top: 15px;
            display: none;
            text-align: center;
        }

        footer {
            margin-top: 40px;
            text-align: center;
            font-size: 11px;
            color: #555555;
            border-top: 1px solid #2d2d2d;
            padding-top: 20px;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <header>
        <div class="brand-box">
            <img src="./logo.png" alt="SROVNALIK FINANCE" class="app-logo">
            <div class="brand-subtitle">Finance & Investment Solutions</div>
        </div>
    </header>

    <main>
        <h2 class="section-title">Nabídka investičních balíčků</h2>
        <div class="products-list" id="products-target">
            </div>

        <div class="grid-meta">
            <div class="meta-panel">
                <h2 class="section-title">Přehled pozic</h2>
                <div class="meta-row">
                    <span>Vybrané investiční plány:</span>
                    <span id="display-count">0 ks</span>
                </div>
                <div class="meta-row highlight">
                    <span>Celková investice:</span>
                    <span id="display-price">0 Kč</span>
                </div>
            </div>

            <div class="meta-panel">
                <h2 class="section-title">Identifikace klienta</h2>
                <div class="form-field">
                    <label>Jméno a Příjmení</label>
                    <input type="text" id="inp-name" value="Kryštof Srovnalík" required>
                </div>
                <div class="form-field">
                    <label>Kontaktní E-mail</label>
                    <input type="email" id="inp-email" value="srovnalik.krystof@gmail.com" required>
                </div>
                <div class="form-field">
                    <label>Telefonní spojení</label>
                    <input type="tel" id="inp-phone" value="+420 702 675 236" required>
                </div>
            </div>
        </div>

        <div class="submit-container">
            <button class="action-button" onclick="processOrder()">Odeslat závaznou objednávku</button>
            <div class="warning-text" id="warning-msg">Chyba: Vyberte alespoň 1 balíček a vyplňte kontakty.</div>
        </div>
    </main>

    <footer>
        &copy; 2026 SROVNALIK FINANCE. Všechna práva vyhrazena. Studentský projekt GitHub-Pages.
    </footer>
</div>

<script>
    // Bezpečný přímý zápis dat, aby se obešel problém s načítáním souborů na GitHubu
    const csvDataMock = `id;name;description;price
1;Startovací investiční balíček;Balíček pro začátečníky zahrnující bezpečnější investice ETF fondy a pravidelné malé vklady.;5000
2;Studentský růstový balíček;Investiční plán pro studenty zaměřený na postupné budování financí na auto bydlení nebo cestování.;2000
3;Konzervativní balíček;Balíček obsahující stabilní a méně rizikové investice například dluhopisy a dividendové akcie.;10000
4;Premium Wealth balíček;Prémiová služba s individuální investiční strategií a správou větších finančních vkladů.;50000
5;Pasivní příjem balíček;Investice zaměřené na pravidelný příjem pomocí dividend a dlouhodobého zhodnocení peněz.;15000
6;Crypto & Tech balíček;Rizikovější investice do kryptoměn AI společností a technologických akcií.;8000
7;Rodinný spořící balíček;Dlouhodobé spoření a investování financí pro děti a budoucí rodinné cíle.;4000
8;FIRE balíček;Investiční plán zaměřený na dosažení finanční nezávislosti a možnost dřívějšího odchodu do důchodu.;25000
9;VIP správa investic;Kompletní správa klientských financí investic a pravidelných financí.;100000`;

    let globalProducts = [];

    function initApp() {
        try {
            const lines = csvDataMock.split('\n');
            const target = document.getElementById('products-target');
            target.innerHTML = '';

            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                
                const dataCells = lines[i].split(';');
                if(dataCells.length < 4) continue;

                const item = {
                    id: dataCells[0].trim(),
                    name: dataCells[1].trim(),
                    desc: dataCells[2].trim(),
                    price: parseInt(dataCells[3].trim()) || 0
                };
                
                globalProducts.push(item);

                const row = document.createElement('div');
                row.className = 'product-item';
                row.innerHTML = `
                    <div class="product-details">
                        <h3>${item.name}</h3>
                        <p>${item.desc}</p>
                    </div>
                    <div class="product-action">
                        <div class="product-cost">${item.price.toLocaleString('cs-CZ')} Kč</div>
                        <input type="number" class="input-qty" id="quantity-${item.id}" min="0" value="0" oninput="updateTotals()">
                    </div>
                `;
                target.appendChild(row);
            }
        } catch (err) {
            console.error(err);
        }
    }

    function updateTotals() {
        let totalPieces = 0;
        let totalMoney = 0;

        globalProducts.forEach(item => {
            const qtyField = document.getElementById(`quantity-${item.id}`);
            const qty = parseInt(qtyField.value) || 0;
            
            if (qty > 0) {
                totalPieces += qty;
                totalMoney += (qty * item.price);
            }
        });

        document.getElementById('display-count').innerText = totalPieces + ' ks';
        document.getElementById('display-price').innerText = totalMoney.toLocaleString('cs-CZ') + ' Kč';
        
        return { totalPieces, totalMoney };
    }

    function processOrder() {
        const { totalPieces, totalMoney } = updateTotals();
        const clientName = document.getElementById('inp-name').value.trim();
        const clientEmail = document.getElementById('inp-email').value.trim();
        const clientPhone = document.getElementById('inp-phone').value.trim();
        const alertBox = document.getElementById('warning-msg');

        if (totalPieces === 0 || !clientName || !clientEmail || !clientPhone) {
            alertBox.style.display = 'block';
            return;
        }
        alertBox.style.display = 'none';

        let emailInventory = '';
        globalProducts.forEach(item => {
            const currentQty = parseInt(document.getElementById(`quantity-${item.id}`).value) || 0;
            if (currentQty > 0) {
                emailInventory += `- ${item.name} | Počet: ${currentQty}x\n`;
            }
        });

        const targetEmail = "app@kostka-skola.cz";
        const emailSubject = encodeURIComponent(`Nová objednávka - SROVNALIK FINANCE`);
        
        const mailBody = `SUMARIZACE OBJEDNÁVKY\n` +
                         `----------------------------------------\n\n` +
                         `Objednané investiční produkty:\n${emailInventory}\n` +
                         `Celkový objem položek: ${totalPieces} ks\n` +
                         `Výsledná kalkulace ceny: ${totalMoney} Kč\n\n` +
                         `ÚDAJE O ZÁKAZNÍKOVI:\n` +
                         `----------------------------------------\n` +
                         `Jméno: ${clientName}\n` +
                         `E-mail: ${clientEmail}\n` +
                         `Telefon: ${clientPhone}\n`;

        window.location.href = `mailto:${targetEmail}?subject=${emailSubject}&body=${encodeURIComponent(mailBody)}`;
    }

    window.onload = initApp;
</script>

</body>
</html>
