<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SROVNALIK FINANCE | Investiční Portál</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121212;
            color: #e0e0e0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        /* Minimalistické Záhlaví a Logo */
        header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-container {
            margin-bottom: 15px;
        }

        /* Stylování nahraného loga logo.png */
        .logo-img {
            max-width: 180px;
            height: auto;
            display: inline-block;
        }

        /* Výpis produktů */
        .products-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }

        .product-card {
            background-color: #1a1a1a;
            border: 1px solid #2d2d2d;
            border-radius: 4px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: border-color 0.3s;
        }

        .product-card:hover {
            border-color: #444444;
        }

        .product-info h3 {
            color: #ffffff;
            font-size: 16px;
            margin-bottom: 5px;
        }

        .product-info p {
            color: #aaaaaa;
            font-size: 13px;
            line-height: 1.4;
            margin-bottom: 10px;
        }

        .product-price {
            color: #ffffff;
            font-weight: bold;
            font-size: 15px;
        }

        .quantity-selector {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .quantity-selector input {
            width: 60px;
            background-color: #262626;
            border: 1px solid #3d3d3d;
            color: #ffffff;
            padding: 8px;
            border-radius: 4px;
            text-align: center;
        }

        /* Souhrn objednávky (Košík) */
        .summary-box {
            background-color: #1a1a1a;
            border: 1px solid #2d2d2d;
            padding: 20px;
            border-radius: 4px;
            margin-bottom: 30px;
        }

        .summary-box h2 {
            font-size: 18px;
            color: #ffffff;
            margin-bottom: 15px;
            border-bottom: 1px solid #2d2d2d;
            padding-bottom: 10px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .summary-row.total {
            font-size: 18px;
            font-weight: bold;
            color: #ffffff;
            margin-top: 15px;
            border-top: 1px solid #2d2d2d;
            padding-top: 15px;
        }

        /* Kontaktní formulář */
        .form-box {
            background-color: #1a1a1a;
            border: 1px solid #2d2d2d;
            padding: 20px;
            border-radius: 4px;
            margin-bottom: 30px;
